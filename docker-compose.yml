  #     - crowdsec-db:/var/lib/crowdsec/data/
  #     - crowdsec-config:/etc/crowdsec/
  #     - traefik-logs:/var/log/traefik:ro
  #   labels:
  #     - traefik.enable=false
  #   networks:
  #     - app-network

  backup:
    image: offen/docker-volume-backup:v2
    restart: always
    env_file: ./backup.env
    volumes:
      - wordpress:/backup/wordpress:ro
      - db:/backup/db:ro
      - ./config:/backup/host-config/config:ro
      - ./.env:/backup/host-config/env-wordpress:ro
      - ./.env-traefik:/backup/host-config/env-traefik:ro
      - ./wp-content/mu-plugins:/backup/host-config/mu-plugins:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /path/to/local/backups:/archive
      - ./config/backup-ssh-key:/run/secrets/backup-ssh-key:ro
    networks:
      - db-network
    labels:
      - traefik.enable=false

  wp-cron:
    image: wordpress:cli
    volumes_from:
      - wordpress
    links:
      - db:mysql
    entrypoint: /bin/sh
    command: >-
      -c 'while true; do php -d memory_limit=512M /usr/local/bin/wp cron event run --due-now; sleep 60; done'
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: $MYSQL_USER
      WORDPRESS_DB_PASSWORD: $MYSQL_PASSWORD
      WORDPRESS_DB_NAME: $MYSQL_DATABASE
      PHP_MEMORY_LIMIT: 512M
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', '6379');
        define('WP_CACHE', true);
        define('WP_CACHE_KEY_SALT', 'example.com');
        define('WP_REDIS_PREFIX', 'example.com');
        define('WP_REDIS_DATABASE', '0');
        define('DISABLE_WP_CRON', true);
        define('WP_MEMORY_LIMIT', '512M');
    depends_on:
      - wordpress
    networks:
      - app-network
      - db-network
    restart: always

  # certbot:
  #   depends_on:
  #     - webserver
  #   image: certbot/dns-cloudflare
  #   container_name: certbot
  #   volumes:
  #     - certbot-etc:/etc/letsencrypt
  #     - wordpress:/var/www/html
  #   command: certonly --webroot --webroot-path=/var/www/html --email sammy@your_domain --agree-tos --no-eff-email --staging -d your_domain -d www.your_domain


volumes:
  wordpress:
  certbot-etc:
  db:
  traefik-logs:
  crowdsec-logs:
  crowdsec-db:
  crowdsec-config:

networks:
  app-network:
    driver: bridge
  db-network:
